name: Build macOS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

jobs:
  build-macos:
    name: Build node-nstool for macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: x64
            node_arch: x64
          - os: macos-latest
            arch: arm64
            node_arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build libraries (x64 only)
        if: matrix.arch == 'x64'
        run: npm run build-libraries

      - name: Build for ${{ matrix.arch }}
        run: npm run rebuild

      - name: Create prebuilds
        if: github.event_name == 'release'
        run: npm run package-prebuild

      - name: Upload prebuilds
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-macos-${{ matrix.arch }}
          path: prebuilds/

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: prebuilds/**/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

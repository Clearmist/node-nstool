name: Build Windows

on:
  push:
    branches: [ main, develop ]
    tags-ignore: [ '**' ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Build node-nstool for Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            node_arch: x64
          - os: windows-11-arm
            arch: arm64
            node_arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: ${{ matrix.node_arch }}

      - name: Install dependencies
        run: npm install

      - name: Build libraries
        run: npm run build-libraries

      - name: Build for ${{ matrix.arch }}
        run: npm run rebuild

      - name: Create prebuilds
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: npm run package-prebuild

      - name: Upload prebuilds
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-windows-${{ matrix.arch }}
          path: prebuilds/

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: prebuilds/**/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

jobs:
  build-windows:
    name: Build node-nstool for Windows ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            node_arch: x64
    env:
      NODE_NSTOOL_TARGET_PLATFORM: win32
      npm_config_platform: win32
      npm_config_arch: x64
      CC: x86_64-w64-mingw32-gcc
      CXX: x86_64-w64-mingw32-g++
      AR: x86_64-w64-mingw32-ar
      RANLIB: x86_64-w64-mingw32-ranlib
      GYP_DEFINES: OS=win
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: ${{ matrix.node_arch }}

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Install dependencies
        run: npm install

      - name: Build Windows static libraries (cross-compile)
        run: |
          set -euxo pipefail
          for lib in libfmt liblz4 libmbedtls libtoolchain libpietendo; do
            pushd "deps/nstool/deps/${lib}"
            npx cmake-js rebuild \
              --prefer-make \
              --cc "$CC" \
              --cxx "$CXX" \
              --CDCMAKE_SYSTEM_NAME=Windows \
              --CDPLATFORM_NAME=win32
            popd
            node scripts/copy-library.cjs "$lib"
          done

      - name: Build for ${{ matrix.arch }}
        run: npm run rebuild -- --arch=${{ matrix.arch }}

      - name: Create prebuilds
        if: github.event_name == 'release'
        run: npm run package-prebuild -- --platform win32 --arch ${{ matrix.arch }}

      - name: Upload prebuilds
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-windows-${{ matrix.arch }}
          path: prebuilds/

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: prebuilds/**/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
